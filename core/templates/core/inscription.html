{% extends "core/base.html" %}
{% load static %}

{% block title %}
Inscription
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- HEADER -->
                <div class="bg-dark text-white text-center p-4">

                    <h2 class="fw-bold mb-2">
                        Créer un compte
                    </h2>

                    <p class="mb-0 text-light">
                        Rejoignez notre plateforme de réservation
                    </p>

                </div>

                <!-- FORM -->
                <div class="card-body p-4">

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button class="btn btn-success w-100 py-2 mt-3 rounded-3">

                            S'inscrire

                        </button>

                    </form>

                    <!-- LIEN CONNEXION -->
                    <div class="text-center mt-4">

                        <p class="text-muted">

                            Vous avez déjà un compte ?

                        </p>

                        <a href="{% url 'connexion' %}"
                           class="btn btn-outline-dark rounded-3">

                            Se connecter

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
